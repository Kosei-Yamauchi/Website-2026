<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal | KOSEI YAMAUCHI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="main-content">
        <div class="hero-wrapper" onclick="nextSlide()">
            <img id="slide-img" src="" class="hero-image">
            <p id="slide-cap" class="hero-caption"></p>
        </div>
    </main>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        const images = PROJECT_DATA.personal;
        let idx = 0;
        function updateSlide() {
            document.getElementById('slide-img').src = images[idx].src;
            document.getElementById('slide-cap').innerText = images[idx].cap;
        }
        function nextSlide() { idx = (idx + 1) % images.length; updateSlide(); }
        window.onload = () => {
            const hash = window.location.hash.replace('#', '');
            const found = images.findIndex(i => i.id === hash);
            if(found !== -1) idx = found;
            updateSlide();
        }
    </script>
</body>
</html>
