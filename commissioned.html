<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSEI YAMAUCHI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="main-content">
        <div class="hero-wrapper">
            <div class="slide-controls">
                <div class="click-area area-left" onclick="prevSlide()"></div>
                <div class="click-area area-right" onclick="nextSlide()"></div>
            </div>
            
            <img id="slide-img" src="" class="hero-image" style="transition: opacity 0.3s;">
            <p id="slide-cap" class="hero-caption"></p>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
    
    <script>
        // PROJECT_DATA が data.js から正しく読み込まれている必要があります
        const category = window.location.pathname.includes("personal") ? "personal" : "commissioned";
        const images = PROJECT_DATA[category];
        let idx = 0;

        function updateSlide() {
            const imgEl = document.getElementById('slide-img');
            const capEl = document.getElementById('slide-cap');
            
            if (!imgEl || !images) return;

            imgEl.style.opacity = 0;
            setTimeout(() => {
                imgEl.src = images[idx].src;
                capEl.innerText = images[idx].cap;
                imgEl.style.opacity = 1;
            }, 200);
        }

        function nextSlide() {
            idx = (idx + 1) % images.length;
            updateSlide();
        }

        function prevSlide() {
            idx = (idx - 1 + images.length) % images.length;
            updateSlide();
        }

        // ページ読み込み時の処理
        // script.js の initApp と競合しないよう、少し遅らせるかイベントリスナーを使います
        window.addEventListener('load', () => {
            const hash = window.location.hash.replace('#', '');
            const found = images.findIndex(i => i.id === hash);
            if(found !== -1) idx = found;
            updateSlide();
        });
    </script>
</body>
</html>
